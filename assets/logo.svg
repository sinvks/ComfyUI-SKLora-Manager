<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9c27b0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#673ab7;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#0f0c29" rx="20" ry="20" />
  
  <!-- AI Circuitry Brain Abstract -->
  <g transform="translate(150, 200)">
    <circle cx="0" cy="0" r="100" fill="none" stroke="url(#gradPurple)" stroke-width="2" opacity="0.5" />
    <g filter="url(#glow)">
      <path d="M-60,-40 Q0,-100 60,-40 Q100,20 0,80 Q-100,20 -60,-40" fill="none" stroke="white" stroke-width="4" />
      <path d="M-30,-20 L30,-20 L40,10 L0,40 L-40,10 Z" fill="url(#gradPurple)" />
      <circle cx="-10" cy="0" r="4" fill="white" />
      <circle cx="15" cy="15" r="4" fill="white" />
      <circle cx="-15" cy="20" r="4" fill="white" />
    </g>
  </g>

  <!-- Text Section -->
  <text x="400" y="190" font-family="Verdana, sans-serif" font-weight="900" font-size="64" fill="white">SK-LoRA</text>
  <text x="400" y="260" font-family="Verdana, sans-serif" font-weight="300" font-size="28" fill="#e1bee7" letter-spacing="4">AI TAG ANALYZER</text>
</svg>